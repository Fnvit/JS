    // marks 에 있는 value들 (점수들)의 평균을 return 하세요!
    function get_average(marks){
        let 국어점수 = marks['국어'];
        let 영어점수 = marks['영어'];
        let 수학점수 = marks['수학'];
        let 평균 = 국어점수 + 영어점수 + 수학점수 / 3;
        return 평균;
    }
    marks = { '국어':90, '영어':80, '수학':85 };
    let average = get_average(marks);
    console.log(`평균은 ${average}점입니다`);

    let sum = 0;
    let sum2 = 0;
    for(let key in marks){
        let value = marks[key];
        sum += value;
        sum2 += 1;
    }
    console.log(sum / sum2);
